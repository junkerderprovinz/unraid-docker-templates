name: Validate

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install xmllint
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends libxml2-utils

      - name: XML well-formedness
        shell: bash
        run: |
          set -euo pipefail
          shopt -s globstar nullglob
          n=0
          for f in **/*.xml; do
            echo "xmllint $f"
            xmllint --noout "$f"
            n=$((n + 1))
          done
          echo "checked $n XML file(s)"

      - name: Template self-references
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          fail=0
          for d in */; do
            d="${d%/}"
            if [ "$d" = ".github" ]; then continue; fi
            for f in "$d"/*.xml; do
              [ -e "$f" ] || continue
              if grep -qi "<Plugin>true</Plugin>" "$f"; then
                for tag in Name PluginURL; do
                  grep -q "<$tag>" "$f" || { echo "::error file=$f::missing <$tag>"; fail=1; }
                done
              else
                for tag in Name Repository Icon TemplateURL; do
                  grep -q "<$tag>" "$f" || { echo "::error file=$f::missing <$tag>"; fail=1; }
                done
                grep -q "raw.githubusercontent.com/junkerderprovinz/unraid-apps/main/$d/" "$f" \
                  || { echo "::error file=$f::TemplateURL/Icon does not self-reference $d/"; fail=1; }
              fi
            done
          done
          exit "$fail"